# ─────────────────────────────────────────────────────────────────
# docker-compose.yml — La Última Botella (Tienda de Vinos)
# Servicios: app (Laravel + Nginx), db (MySQL 8), phpmyadmin
# ─────────────────────────────────────────────────────────────────
# Uso rápido:
#   docker compose up -d           → Levantar todos los servicios
#   docker compose exec app php artisan migrate --seed
#   docker compose down            → Detener y eliminar contenedores
#   docker compose down -v         → También elimina los volúmenes (borra DB)
# ─────────────────────────────────────────────────────────────────

services:

  # ── Aplicación Laravel ──────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ultima-botella-app
    restart: unless-stopped
    ports:
      - "8000:80"
    environment:
      APP_NAME: "La Ultima Botella"
      APP_ENV: local
      APP_DEBUG: "true"
      APP_URL: http://localhost:8000
      # Base de datos — apunta al servicio "db" de este compose
      DB_CONNECTION: mysql
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: ultima_botella
      DB_USERNAME: laravel
      DB_PASSWORD: secret
      # Caché y sesiones en archivo (sin Redis extra)
      CACHE_DRIVER: file
      SESSION_DRIVER: file
      QUEUE_CONNECTION: sync
    volumes:
      # Persistir logs y archivos subidos sin reconstruir la imagen
      - ./storage:/var/www/html/storage
      - ./bootstrap/cache:/var/www/html/bootstrap/cache
    depends_on:
      db:
        condition: service_healthy
    networks:
      - ultima-botella-net


  # ── Base de datos MySQL 8 ───────────────────────────────────────
  db:
    image: mysql:8.0
    container_name: ultima-botella-db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ultima_botella
      MYSQL_USER: laravel
      MYSQL_PASSWORD: secret
      MYSQL_ROOT_PASSWORD: rootsecret
    ports:
      - "3306:3306"          # acceso desde herramientas locales (TablePlus, DBeaver, etc.)
    volumes:
      - db-data:/var/lib/mysql   # datos persistentes entre reinicios
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "laravel", "-psecret"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - ultima-botella-net


  # ── phpMyAdmin (administración visual de la BD) ─────────────────
  phpmyadmin:
    image: phpmyadmin:5.2-apache
    container_name: ultima-botella-pma
    restart: unless-stopped
    ports:
      - "8080:80"            # acceder desde http://localhost:8080
    environment:
      PMA_HOST: db
      PMA_PORT: 3306
      PMA_USER: laravel
      PMA_PASSWORD: secret
      UPLOAD_LIMIT: 64M
    depends_on:
      - db
    networks:
      - ultima-botella-net


# ── Volúmenes y redes ───────────────────────────────────────────
volumes:
  db-data:
    driver: local

networks:
  ultima-botella-net:
    driver: bridge
