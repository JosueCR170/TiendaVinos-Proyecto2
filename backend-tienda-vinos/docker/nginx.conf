# ─────────────────────────────────────────────────────────────────
# docker/nginx.conf — Nginx para Laravel 9
# ─────────────────────────────────────────────────────────────────

server {
    listen 80;
    server_name localhost;

    root /var/www/html/public;
    index index.php index.html;

    charset utf-8;

    # Comprimir respuestas
    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # Logs dentro del contenedor
    access_log /var/log/nginx/access.log;
    error_log  /var/log/nginx/error.log;

    # Forzar HTTPS en headers para que Laravel genere URLs correctas
    set $forwarded_proto $scheme;
    if ($http_x_forwarded_proto = "https") {
        set $forwarded_proto "https";
    }

    # Punto de entrada de Laravel — todas las rutas pasan por index.php
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # Assets compilados por Vite (JS, CSS, imágenes)
    location /build {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # PHP-FPM: pasar peticiones .php al socket de PHP
    location ~ \.php$ {
        fastcgi_pass   127.0.0.1:9000;
        fastcgi_index  index.php;
        fastcgi_param  SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include        fastcgi_params;
        fastcgi_read_timeout 60s;
    }

    # Bloquear acceso a archivos ocultos (.env, .git, etc.)
    location ~ /\. {
        deny all;
    }

    # Tamaño máximo de subida (ajustar según necesidad del proyecto)
    client_max_body_size 20M;
}
