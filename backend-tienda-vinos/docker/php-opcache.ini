; ─────────────────────────────────────────────────────────────────
; docker/php-opcache.ini — OPcache para PHP 8.0 en producción
; ─────────────────────────────────────────────────────────────────

[opcache]
opcache.enable=1
opcache.enable_cli=0
opcache.memory_consumption=128
opcache.interned_strings_buffer=8
opcache.max_accelerated_files=10000
opcache.revalidate_freq=0          ; 0 = nunca revalida (producción)
opcache.validate_timestamps=0      ; desactivado en producción
opcache.save_comments=1
opcache.fast_shutdown=1
